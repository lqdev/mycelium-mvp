<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍄 Mycelium Dashboard</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <span class="logo">🍄 Mycelium</span>
      <span class="subtitle">Federated Agent Orchestration Network</span>
      <div class="status-bar">
        <span class="status-dot" id="sse-dot" title="SSE connection"></span>
        <span id="event-count" class="stat">0 events</span>
        <span class="sep">·</span>
        <span id="task-progress" class="stat">0/8 tasks</span>
        <span class="sep">·</span>
        <span id="agent-count" class="stat">0 agents</span>
      </div>
    </div>
  </header>

  <main class="grid">
    <!-- Panel 1: Agent Registry -->
    <section class="panel" id="panel-agents">
      <h2 class="panel-title">🤖 Agent Registry</h2>
      <div id="agents-list" class="card-list">
        <div class="placeholder">Bootstrapping agents…</div>
      </div>
    </section>

    <!-- Panel 2: Wanted Board -->
    <section class="panel" id="panel-tasks">
      <h2 class="panel-title">📋 Wanted Board</h2>
      <div id="tasks-list" class="card-list">
        <div class="placeholder">Waiting for project to start…</div>
      </div>
    </section>

    <!-- Panel 3: Firehose Stream -->
    <section class="panel" id="panel-firehose">
      <h2 class="panel-title">
        📡 Firehose Stream
        <span class="filter-bar">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="task">Tasks</button>
          <button class="filter-btn" data-filter="agent">Agents</button>
          <button class="filter-btn" data-filter="reputation">Rep</button>
        </span>
      </h2>
      <div id="firehose-list" class="event-log"></div>
    </section>

    <!-- Panel 4: Reputation Board -->
    <section class="panel" id="panel-reputation">
      <h2 class="panel-title">⭐ Reputation Board</h2>
      <div id="reputation-list" class="card-list">
        <div class="placeholder">Waiting for completed tasks…</div>
      </div>
    </section>
  </main>

  <!-- SQL Explorer panel (full-width, below grid) -->
  <section class="sql-panel" id="panel-sql">
    <div class="sql-panel-header">
      <span class="sql-panel-title">🔍 SQL Explorer</span>
      <div class="sql-presets">
        <button class="sql-preset" data-sql="SELECT * FROM agent_identities">identities</button>
        <button class="sql-preset" data-sql="SELECT collection, COUNT(*) AS cnt FROM firehose_events GROUP BY 1 ORDER BY 2 DESC">events by type</button>
        <button class="sql-preset" data-sql="SELECT collection, rkey, created_at FROM records ORDER BY created_at DESC LIMIT 20">recent records</button>
        <button class="sql-preset" data-sql="SELECT * FROM commits ORDER BY seq DESC LIMIT 20">recent commits</button>
      </div>
      <button class="sql-toggle" id="sql-toggle" title="Collapse">▼</button>
    </div>
    <div class="sql-panel-body" id="sql-body">
      <div class="sql-input-row">
        <textarea id="sql-input" class="sql-textarea" placeholder="SELECT * FROM agent_identities  (Ctrl+Enter to run)" rows="2" spellcheck="false"></textarea>
        <button id="sql-run" class="sql-run-btn">Run</button>
      </div>
      <div id="sql-results" class="sql-results"></div>
    </div>
  </section>

  <!-- Slide-over detail panel -->
  <div class="overlay" id="overlay" aria-hidden="true"></div>
  <aside class="detail-panel" id="detail-panel" aria-hidden="true">
    <div class="detail-header">
      <div>
        <div class="detail-title" id="detail-title">Detail</div>
        <div class="detail-subtitle" id="detail-subtitle"></div>
      </div>
      <button class="detail-close" id="detail-close" aria-label="Close">✕</button>
    </div>
    <div class="detail-body" id="detail-body">
      <div class="placeholder">Loading…</div>
    </div>
  </aside>

  <script src="/app.js"></script>
</body>
</html>
