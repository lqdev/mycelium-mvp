version: '3.8'

services:
  # ── Mycelium dashboard ────────────────────────────────────────────────────
  mycelium:
    build: .
    # NOTE: do NOT pin platform: linux/amd64 — DuckDB ships linux-aarch64 binaries
    # and forcing amd64 on Apple Silicon causes QEMU segfaults. Build native.
    ports:
      - "3000:3000"
    volumes:
      - mycelium-data:/app/data
    environment:
      # Set to "true" to enable real LLM inference (requires GITHUB_TOKEN or LOCAL_ONLY_MODEL)
      - MYCELIUM_ENABLE_INFERENCE=${MYCELIUM_ENABLE_INFERENCE:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - LOCAL_ONLY_MODEL=${LOCAL_ONLY_MODEL:-}
      # PDS bridge — enabled when running with --profile pds
      - PDS_ENDPOINT=${PDS_ENDPOINT:-}
      - PDS_ADMIN_PASSWORD=${PDS_ADMIN_PASSWORD:-}
      # Jetstream federation — enabled when running with --profile jetstream
      - JETSTREAM_ENDPOINT=${JETSTREAM_ENDPOINT:-}

  # ── Local AT Protocol PDS ─────────────────────────────────────────────────
  # Opt-in: docker compose --profile pds up
  #
  # First-time setup:
  #   npm run pds-init        # generates .env.docker with PDS secrets
  #
  # With PDS running, enable bridge:
  #   PDS_ENDPOINT=http://pds:2583 PDS_ADMIN_PASSWORD=<from .env.docker> docker compose --profile pds up
  pds:
    image: ghcr.io/bluesky-social/pds:latest
    profiles: ["pds"]
    # ghcr.io/bluesky-social/pds ships multi-arch (amd64 + arm64) — no platform pin needed
    ports:
      - "2583:2583"
    volumes:
      - pds-data:/pds
    env_file: .env.docker
    environment:
      - PDS_HOSTNAME=${PDS_HOSTNAME:-localhost}
      - PDS_PORT=2583
      - PDS_DATA_DIRECTORY=/pds
      - PDS_BLOBSTORE_DISK_LOCATION=/pds/blobs
      - PDS_DID_PLC_URL=https://plc.directory
      - PDS_BSKY_APP_VIEW_URL=
      - PDS_CRAWLERS=
      - PDS_INVITE_REQUIRED=0
      # PDS_DEV_MODE bypasses the HTTPS requirement for the OAuth subsystem.
      # Required for local HTTP-only development (PDS 0.4.x+).
      - PDS_DEV_MODE=true
      - LOG_ENABLED=1
      - LOG_LEVEL=info

  # ── Jetstream relay ──────────────────────────────────────────────────────
  # Opt-in: docker compose --profile jetstream up
  # Subscribes to the local PDS firehose and re-emits events as JSON over WebSocket.
  # Enables multi-node federation: a second Mycelium instance can subscribe to
  # ws://localhost:6008/subscribe to receive events from this instance.
  #
  # Usage:
  #   JETSTREAM_ENDPOINT=ws://jetstream:6008/subscribe \
  #   docker compose --profile pds --profile jetstream up
  jetstream:
    image: ghcr.io/bluesky-social/jetstream:sha-8a65de4
    profiles: ["jetstream"]
    ports:
      - "6008:6008"
    depends_on:
      - pds
    environment:
      - JETSTREAM_WEBSOCKET_URLS=ws://pds:2583/xrpc/com.atproto.sync.subscribeRepos
      - JETSTREAM_LISTEN_ADDR=:6008

volumes:
  mycelium-data:
  pds-data:

